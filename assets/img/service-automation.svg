<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
<defs>
  <linearGradient id="sa-bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0F2027"/><stop offset="55%" stop-color="#16323B"/><stop offset="100%" stop-color="#1A1714"/>
  </linearGradient>
  <linearGradient id="sa-acc" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4FD8C4"/><stop offset="100%" stop-color="#2FA89B"/>
  </linearGradient>
</defs>
<rect width="640" height="480" fill="url(#sa-bg)"/>
<ellipse cx="460" cy="140" rx="240" ry="180" fill="rgba(79,216,196,0.10)"/>
<!-- workflow nodes -->
<circle cx="110" cy="240" r="34" fill="rgba(79,216,196,0.14)" stroke="rgba(79,216,196,0.5)" stroke-width="1.6"/>
<text x="110" y="245" font-family="monospace" font-size="10" fill="#4FD8C4" text-anchor="middle">LEAD</text>
<line x1="144" y1="240" x2="216" y2="200" stroke="rgba(79,216,196,0.4)" stroke-width="2" stroke-dasharray="5,5"/>
<circle cx="250" cy="180" r="34" fill="rgba(79,216,196,0.18)" stroke="rgba(79,216,196,0.5)" stroke-width="1.6"/>
<text x="250" y="178" font-family="monospace" font-size="9" fill="#4FD8C4" text-anchor="middle">AI</text>
<text x="250" y="190" font-family="monospace" font-size="9" fill="#4FD8C4" text-anchor="middle">BOT</text>
<line x1="284" y1="180" x2="356" y2="220" stroke="rgba(79,216,196,0.4)" stroke-width="2" stroke-dasharray="5,5"/>
<circle cx="390" cy="240" r="34" fill="rgba(79,216,196,0.18)" stroke="rgba(79,216,196,0.5)" stroke-width="1.6"/>
<text x="390" y="245" font-family="monospace" font-size="10" fill="#4FD8C4" text-anchor="middle">CRM</text>
<line x1="424" y1="240" x2="496" y2="200" stroke="rgba(79,216,196,0.5)" stroke-width="2.2"/>
<circle cx="530" cy="180" r="38" fill="url(#sa-acc)"/>
<text x="530" y="186" font-family="monospace" font-size="11" fill="#0F2027" text-anchor="middle" font-weight="700">SALE</text>
<circle cx="530" cy="180" r="48" fill="none" stroke="rgba(79,216,196,0.25)" stroke-width="1.5"/>

<!-- 24/7 badge -->
<rect x="60" y="320" width="160" height="84" rx="14" fill="rgba(79,216,196,0.10)" stroke="rgba(79,216,196,0.4)" stroke-width="1"/>
<text x="78" y="348" font-family="monospace" font-size="10" fill="rgba(79,216,196,0.85)" letter-spacing="1.5">ПРАЦЮЄ</text>
<text x="78" y="382" font-family="Georgia,serif" font-size="32" fill="#4FD8C4" font-weight="300">24/7</text>

<!-- ROI badge -->
<rect x="240" y="330" width="150" height="74" rx="14" fill="rgba(79,216,196,0.06)" stroke="rgba(79,216,196,0.25)" stroke-width="1"/>
<text x="256" y="356" font-family="monospace" font-size="10" fill="rgba(79,216,196,0.7)" letter-spacing="1.5">ROI</text>
<text x="256" y="385" font-family="Georgia,serif" font-size="26" fill="#4FD8C4">×4.2</text>

<!-- terminal lines -->
<rect x="412" y="330" width="168" height="84" rx="10" fill="rgba(0,0,0,0.25)" stroke="rgba(79,216,196,0.2)" stroke-width="1"/>
<text x="426" y="350" font-family="monospace" font-size="8" fill="rgba(79,216,196,0.6)">$ webhook.trigger()</text>
<text x="426" y="364" font-family="monospace" font-size="8" fill="rgba(79,216,196,0.5)">$ crm.sync(lead)</text>
<text x="426" y="378" font-family="monospace" font-size="8" fill="rgba(79,216,196,0.7)">$ status: <tspan fill="#4FD8C4">success ✓</tspan></text>
<text x="426" y="394" font-family="monospace" font-size="8" fill="rgba(79,216,196,0.4)">$ awaiting next...</text>
</svg>
