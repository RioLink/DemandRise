<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420">
<defs>
  <linearGradient id="bgFood" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2B1810"/>
    <stop offset="55%" stop-color="#34200F"/>
    <stop offset="100%" stop-color="#1A1714"/>
  </linearGradient>
  <linearGradient id="foodAccent" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FF7A45"/>
    <stop offset="100%" stop-color="#FFC542"/>
  </linearGradient>
</defs>
<rect width="640" height="420" fill="url(#bgFood)"/>
<ellipse cx="180" cy="150" rx="220" ry="170" fill="rgba(255,122,69,0.10)"/>

<!-- Before logo (faded, generic) -->
<rect x="60" y="60" width="200" height="140" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="160" y="125" font-family="DM Sans, sans-serif" font-size="20" fill="rgba(247,244,239,0.3)" text-anchor="middle">FoodCorner</text>
<text x="160" y="148" font-family="monospace" font-size="9" fill="rgba(247,244,239,0.18)" text-anchor="middle" letter-spacing="2">СТАРИЙ ЛОГОТИП</text>
<line x1="90" y1="165" x2="230" y2="165" stroke="rgba(247,244,239,0.08)" stroke-width="1"/>

<!-- Arrow -->
<path d="M270 130 L330 130" stroke="rgba(255,122,69,0.5)" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<polygon points="322,122 338,130 322,138" fill="rgba(255,122,69,0.6)"/>

<!-- After logo (vibrant) -->
<rect x="350" y="50" width="230" height="160" rx="16" fill="rgba(255,122,69,0.08)" stroke="rgba(255,122,69,0.4)" stroke-width="1.5"/>
<text x="465" y="120" font-family="Georgia,serif" font-size="30" fill="url(#foodAccent)" text-anchor="middle" font-weight="600">FoodCorner</text>
<line x1="390" y1="138" x2="540" y2="138" stroke="rgba(255,122,69,0.4)" stroke-width="1.5"/>
<text x="465" y="160" font-family="monospace" font-size="10" fill="rgba(255,197,66,0.8)" text-anchor="middle" letter-spacing="3">FRESH · FAST · LOCAL</text>
<!-- icon mark -->
<circle cx="465" cy="185" r="10" fill="url(#foodAccent)"/>

<!-- Recognition growth chart -->
<rect x="60" y="230" width="520" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="78" y="250" font-family="monospace" font-size="9" fill="rgba(255,197,66,0.7)" letter-spacing="1">ВПІЗНАВАНІСТЬ БРЕНДУ</text>
<rect x="78" y="262" width="60" height="34" rx="4" fill="rgba(255,122,69,0.2)"/>
<rect x="148" y="262" width="60" height="34" rx="4" fill="rgba(255,122,69,0.32)"/>
<rect x="218" y="262" width="60" height="34" rx="4" fill="rgba(255,140,69,0.5)"/>
<rect x="288" y="252" width="60" height="44" rx="4" fill="url(#foodAccent)" opacity="0.9"/>
<text x="318" y="248" font-family="Georgia,serif" font-size="20" fill="#FFC542" text-anchor="middle" font-weight="600">+3×</text>
<rect x="358" y="262" width="200" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
<text x="460" y="285" font-family="monospace" font-size="9" fill="rgba(247,244,239,0.4)" text-anchor="middle">мережі по всій Україні</text>

<!-- Labels -->
<text x="60" y="368" font-family="Georgia,serif" font-size="24" fill="rgba(247,244,239,0.92)">Мережа «FoodCorner»</text>
<text x="60" y="393" font-family="monospace" font-size="11" fill="rgba(255,197,66,0.85)" letter-spacing="1.5">РЕБРЕНДИНГ · ВПІЗНАВАНІСТЬ +3×</text>
</svg>
