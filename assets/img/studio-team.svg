<text x="460" y="158" font-family="monospace" font-size="9" fill="rgba(212,167,106,0.5)" text-anchor="middle" letter-spacing="1">AI DASHBOARD</text>
<!-- content blocks -->
<rect x="375" y="178" width="80" height="50" rx="6" fill="rgba(184,134,78,0.15)" stroke="rgba(184,134,78,0.25)" stroke-width="1"/>
<text x="415" y="198" font-family="monospace" font-size="8" fill="rgba(212,167,106,0.6)" text-anchor="middle">LEADS</text>
<text x="415" y="216" font-family="Georgia,serif" font-size="16" fill="#D4A76A" text-anchor="middle">+200%</text>
<rect x="465" y="178" width="80" height="50" rx="6" fill="rgba(184,134,78,0.15)" stroke="rgba(184,134,78,0.25)" stroke-width="1"/>
<text x="505" y="198" font-family="monospace" font-size="8" fill="rgba(212,167,106,0.6)" text-anchor="middle">ROI</text>
<text x="505" y="216" font-family="Georgia,serif" font-size="16" fill="#D4A76A" text-anchor="middle">×4.2</text>
<rect x="375" y="238" width="170" height="8" rx="4" fill="rgba(184,134,78,0.2)"/>
<rect x="375" y="254" width="130" height="8" rx="4" fill="rgba(184,134,78,0.12)"/>
<rect x="375" y="270" width="150" height="8" rx="4" fill="rgba(184,134,78,0.16)"/>
<rect x="375" y="286" width="100" height="8" rx="4" fill="rgba(184,134,78,0.1)"/>
<!-- stand -->
<rect x="448" y="320" width="24" height="20" rx="2" fill="rgba(255,255,255,0.05)"/>
<rect x="432" y="340" width="56" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

<!-- Person silhouette (simplified) -->
<circle cx="320" cy="180" r="28" fill="rgba(184,134,78,0.18)" stroke="rgba(184,134,78,0.35)" stroke-width="1.5"/>
<text x="320" y="188" font-size="24" text-anchor="middle" fill="rgba(212,167,106,0.7)">👤</text>
<!-- Laptop hint -->
<rect x="268" y="320" width="104" height="20" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<rect x="252" y="340" width="136" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

<!-- Floating badge -->
<rect x="200" y="70" width="240" height="60" rx="12" fill="rgba(184,134,78,0.12)" stroke="rgba(184,134,78,0.35)" stroke-width="1"/>
<text x="320" y="96" font-family="monospace" font-size="9" fill="rgba(212,167,106,0.65)" text-anchor="middle" letter-spacing="2">КОМАНДА DEMANDRISE</text>
<text x="320" y="118" font-family="Georgia,serif" font-size="18" fill="rgba(247,244,239,0.85)" text-anchor="middle">AI · SMM · SEO · Branding</text>

<!-- bottom label -->
<text x="80" y="420" font-family="Georgia,serif" font-size="20" fill="rgba(247,244,239,0.7)">Спеціалісти, що дають результат</text>
<text x="80" y="445" font-family="monospace" font-size="10" fill="rgba(184,134,78,0.6)" letter-spacing="1.5">СТРАТЕГІЯ · ВПРОВАДЖЕННЯ · МАСШТАБУВАННЯ</text>
</svg>
