<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
<defs>
  <linearGradient id="bgTeam" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1E1A14"/>
    <stop offset="100%" style="stop-color:#2C2318"/>
  </linearGradient>
  <radialGradient id="teamGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#B8864E;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#B8864E;stop-opacity:0"/>
  </radialGradient>
</defs>
<rect width="640" height="480" fill="url(#bgTeam)"/>
<ellipse cx="320" cy="240" rx="280" ry="220" fill="url(#teamGlow)"/>

<!-- Desk surface hint -->
<rect x="60" y="340" width="520" height="4" rx="2" fill="rgba(184,134,78,0.15)"/>

<!-- Monitor 1 -->
<rect x="80" y="160" width="200" height="160" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
<rect x="80" y="160" width="200" height="28" rx="8" fill="rgba(255,255,255,0.05)"/>
<text x="180" y="178" font-family="monospace" font-size="9" fill="rgba(212,167,106,0.5)" text-anchor="middle" letter-spacing="1">ANALYTICS</text>
<!-- mini chart on monitor 1 -->
<polyline points="100,300 135,280 165,270 195,255 225,240 255,232 265,228" fill="none" stroke="rgba(212,167,106,0.6)" stroke-width="2" stroke-linecap="round"/>
<rect x="100" y="305" width="18" height="15" rx="2" fill="rgba(184,134,78,0.3)"/>
<rect x="124" y="298" width="18" height="22" rx="2" fill="rgba(184,134,78,0.38)"/>
<rect x="148" y="288" width="18" height="32" rx="2" fill="rgba(184,134,78,0.45)"/>
<rect x="172" y="276" width="18" height="44" rx="2" fill="rgba(184,134,78,0.55)"/>
<rect x="196" y="265" width="18" height="55" rx="2" fill="rgba(212,167,106,0.65)"/>
<rect x="220" y="256" width="18" height="64" rx="2" fill="rgba(212,167,106,0.75)"/>
<rect x="245" y="248" width="18" height="72" rx="2" fill="#D4A76A" opacity="0.9"/>
<line x1="96" y1="322" x2="275" y2="322" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<!-- Monitor stand -->
<rect x="168" y="320" width="24" height="20" rx="2" fill="rgba(255,255,255,0.05)"/>
<rect x="152" y="340" width="56" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

<!-- Monitor 2 -->
<rect x="360" y="140" width="200" height="180" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
