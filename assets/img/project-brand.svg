<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420">
<defs>
  <linearGradient id="bgBrand" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1A1714"/>
    <stop offset="100%" style="stop-color:#201910"/>
  </linearGradient>
  <linearGradient id="circleG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#B8864E;stop-opacity:0.9"/>
    <stop offset="100%" style="stop-color:#8B5E2A;stop-opacity:0.7"/>
  </linearGradient>
</defs>
<rect width="640" height="420" fill="url(#bgBrand)"/>
<!-- Color palette strip -->
<rect x="60" y="52" width="70" height="70" rx="10" fill="#B8864E"/>
<rect x="140" y="52" width="70" height="70" rx="10" fill="#D4A76A"/>
<rect x="220" y="52" width="70" height="70" rx="10" fill="#2C2318"/>
<rect x="300" y="52" width="70" height="70" rx="10" fill="#F7F4EF"/>
<rect x="380" y="52" width="70" height="70" rx="10" fill="rgba(184,134,78,0.25)" stroke="rgba(184,134,78,0.4)" stroke-width="1"/>
<rect x="460" y="52" width="70" height="70" rx="10" fill="rgba(247,244,239,0.05)" stroke="rgba(247,244,239,0.15)" stroke-width="1"/>
<!-- Hex values -->
<text x="95" y="136" font-family="monospace" font-size="8" fill="rgba(247,244,239,0.5)" text-anchor="middle">#B8864E</text>
<text x="175" y="136" font-family="monospace" font-size="8" fill="rgba(247,244,239,0.5)" text-anchor="middle">#D4A76A</text>
<text x="255" y="136" font-family="monospace" font-size="8" fill="rgba(247,244,239,0.5)" text-anchor="middle">#2C2318</text>
<text x="335" y="136" font-family="monospace" font-size="8" fill="rgba(100,90,80,0.7)" text-anchor="middle">#F7F4EF</text>
<!-- Logo area -->
<rect x="60" y="160" width="260" height="160" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="190" y="225" font-family="Georgia,serif" font-size="32" fill="rgba(247,244,239,0.88)" text-anchor="middle">NovaTech</text>
<line x1="100" y1="240" x2="280" y2="240" stroke="rgba(184,134,78,0.4)" stroke-width="1"/>
<text x="190" y="260" font-family="monospace" font-size="10" fill="rgba(184,134,78,0.7)" text-anchor="middle" letter-spacing="3">INNOVATION</text>
<!-- Logo mark -->
<polygon points="190,175 205,200 175,200" fill="none" stroke="#B8864E" stroke-width="2" stroke-linejoin="round"/>
<polygon points="190,183 200,196 180,196" fill="rgba(184,134,78,0.3)"/>
<circle cx="190" cy="175" r="3" fill="#D4A76A"/>
<!-- Typography sample -->
<rect x="340" y="160" width="240" height="160" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="360" y="195" font-family="monospace" font-size="9" fill="rgba(212,167,106,0.6)" letter-spacing="1.5">ШРИФТИ</text>
<text x="360" y="222" font-family="Georgia,serif" font-size="28" fill="rgba(247,244,239,0.85)">Display</text>
<text x="360" y="246" font-family="monospace" font-size="14" fill="rgba(247,244,239,0.5)" letter-spacing="1">MONO TYPE</text>
<text x="360" y="268" font-size="12" fill="rgba(247,244,239,0.3)">Body regular 400</text>
<text x="360" y="286" font-family="Georgia,serif" font-size="12" fill="rgba(184,134,78,0.6)" font-style="italic">Italic accent</text>
<text x="360" y="305" font-family="monospace" font-size="9" fill="rgba(247,244,239,0.25)" letter-spacing="0.5">semi bold 600</text>
<!-- brand badge -->
<rect x="380" y="22" width="180" height="22" rx="11" fill="rgba(184,134,78,0.12)" stroke="rgba(184,134,78,0.38)" stroke-width="1"/>
<text x="470" y="36" font-family="monospace" font-size="9" fill="rgba(212,167,106,0.8)" text-anchor="middle" letter-spacing="1.5">BRAND IDENTITY</text>
<!-- Labels -->
<text x="80" y="368" font-family="Georgia,serif" font-size="24" fill="rgba(247,244,239,0.92)">Стартап «NovaTech»</text>
<text x="80" y="393" font-family="monospace" font-size="11" fill="rgba(184,134,78,0.85)" letter-spacing="1.5">БРЕНДИНГ · ВІД ІДЕЇ ДО ВПІЗНАВАНОСТІ</text>
</svg>
