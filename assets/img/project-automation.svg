<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1A1714"/>
    <stop offset="100%" style="stop-color:#2C2318"/>
  </linearGradient>
  <linearGradient id="barG" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" style="stop-color:#8B5E2A"/>
    <stop offset="100%" style="stop-color:#D4A76A"/>
  </linearGradient>
</defs>
<rect width="640" height="420" fill="url(#bg)"/>
<!-- grid -->
<line x1="80" y1="50" x2="80" y2="310" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<line x1="80" y1="310" x2="580" y2="310" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<line x1="80" y1="240" x2="580" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4,6"/>
<line x1="80" y1="170" x2="580" y2="170" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4,6"/>
<line x1="80" y1="100" x2="580" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4,6"/>
<!-- bars before -->
<rect x="110" y="220" width="48" height="90" rx="5" fill="rgba(184,134,78,0.25)"/>
<rect x="195" y="190" width="48" height="120" rx="5" fill="rgba(184,134,78,0.30)"/>
<!-- bars after (growth) -->
<rect x="295" y="140" width="48" height="170" rx="5" fill="url(#barG)" opacity="0.85"/>
<rect x="380" y="88" width="48" height="222" rx="5" fill="url(#barG)"/>
<rect x="465" y="68" width="48" height="242" rx="5" fill="url(#barG)"/>
<!-- divider arrow -->
<text x="270" y="195" font-size="28" fill="rgba(212,167,106,0.6)" text-anchor="middle">→</text>
<!-- growth line -->
<polyline points="134,220 219,190 319,140 404,88 489,68" fill="none" stroke="#D4A76A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="134" cy="220" r="5" fill="#B8864E"/>
<circle cx="219" cy="190" r="5" fill="#B8864E"/>
<circle cx="319" cy="140" r="5" fill="#B8864E"/>
<circle cx="404" cy="88" r="6" fill="#D4A76A"/>
<circle cx="489" cy="68" r="7" fill="#D4A76A" stroke="rgba(212,167,106,0.4)" stroke-width="3"/>
<!-- metric badge -->
<rect x="420" y="22" width="140" height="52" rx="10" fill="rgba(184,134,78,0.15)" stroke="rgba(184,134,78,0.45)" stroke-width="1"/>
<text x="438" y="42" font-family="monospace" font-size="10" fill="rgba(212,167,106,0.75)" letter-spacing="1.5">ПРОДАЖІ</text>
<text x="438" y="64" font-family="Georgia,serif" font-size="22" fill="#D4A76A">+340%</text>
<!-- ai chip -->
<rect x="24" y="22" width="80" height="26" rx="13" fill="rgba(184,134,78,0.12)" stroke="rgba(184,134,78,0.35)" stroke-width="1"/>
<text x="36" y="39" font-family="monospace" font-size="10" fill="rgba(212,167,106,0.9)" letter-spacing="1.5">AI·CRM</text>
<!-- bot icon -->
<rect x="530" y="115" width="68" height="60" rx="10" fill="none" stroke="rgba(184,134,78,0.35)" stroke-width="1.5"/>
<circle cx="552" cy="136" r="5" fill="rgba(212,167,106,0.6)"/>
<circle cx="574" cy="136" r="5" fill="rgba(212,167,106,0.6)"/>
<path d="M548 152 Q563 160 578 152" fill="none" stroke="rgba(212,167,106,0.5)" stroke-width="1.5"/>
<line x1="564" y1="115" x2="564" y2="108" stroke="rgba(184,134,78,0.4)" stroke-width="1.5"/>
<circle cx="564" cy="105" r="4" fill="rgba(184,134,78,0.35)"/>
<!-- labels -->
<text x="80" y="370" font-family="Georgia,serif" font-size="24" fill="rgba(247,244,239,0.92)">FashionFlow E-commerce</text>
<text x="80" y="395" font-family="monospace" font-size="11" fill="rgba(184,134,78,0.85)" letter-spacing="1.5">AI АВТОМАТИЗАЦІЯ · +340% ПРОДАЖІВ · 2024</text>
</svg>
