<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
<defs>
  <linearGradient id="sn-bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0F2818"/><stop offset="55%" stop-color="#143420"/><stop offset="100%" stop-color="#1A1714"/>
  </linearGradient>
  <linearGradient id="sn-acc" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#5BC97E"/><stop offset="100%" stop-color="#A6E89A"/>
  </linearGradient>
</defs>
<rect width="640" height="480" fill="url(#sn-bg)"/>
<ellipse cx="180" cy="160" rx="240" ry="190" fill="rgba(91,201,126,0.10)"/>

<!-- dashboard grid -->
<rect x="50" y="60" width="540" height="240" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(91,201,126,0.2)" stroke-width="1"/>
<text x="70" y="86" font-family="monospace" font-size="10" fill="rgba(91,201,126,0.7)" letter-spacing="1.5">GROWTH DASHBOARD</text>

<!-- bars -->
<rect x="70" y="220" width="32" height="60" rx="4" fill="rgba(91,201,126,0.25)"/>
<rect x="112" y="200" width="32" height="80" rx="4" fill="rgba(91,201,126,0.35)"/>
<rect x="154" y="175" width="32" height="105" rx="4" fill="rgba(91,201,126,0.5)"/>
<rect x="196" y="145" width="32" height="135" rx="4" fill="rgba(120,214,140,0.7)"/>
<rect x="238" y="115" width="32" height="165" rx="4" fill="url(#sn-acc)"/>
<rect x="280" y="100" width="32" height="180" rx="4" fill="url(#sn-acc)"/>
<!-- trend line -->
<polyline points="86,220 128,200 170,175 212,145 254,115 296,100" fill="none" stroke="#A6E89A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="296" cy="100" r="6" fill="#A6E89A" stroke="rgba(166,232,154,0.3)" stroke-width="4"/>

<!-- A/B test split -->
<rect x="340" y="110" width="110" height="130" rx="10" fill="rgba(91,201,126,0.08)" stroke="rgba(91,201,126,0.3)" stroke-width="1"/>
<text x="395" y="132" font-family="monospace" font-size="9" fill="rgba(91,201,126,0.7)" text-anchor="middle">VARIANT A</text>
<rect x="356" y="145" width="78" height="60" rx="6" fill="rgba(91,201,126,0.18)"/>
<text x="395" y="180" font-family="Georgia,serif" font-size="18" fill="#A6E89A" text-anchor="middle">3.2%</text>
<text x="395" y="225" font-family="monospace" font-size="9" fill="rgba(247,244,239,0.4)" text-anchor="middle">conv. rate</text>

<rect x="465" y="100" width="110" height="140" rx="10" fill="rgba(91,201,126,0.16)" stroke="rgba(91,201,126,0.5)" stroke-width="1.3"/>
<text x="520" y="122" font-family="monospace" font-size="9" fill="#A6E89A" text-anchor="middle" font-weight="700">VARIANT B ✓</text>
<rect x="481" y="136" width="78" height="68" rx="6" fill="url(#sn-acc)" opacity="0.85"/>
<text x="520" y="176" font-family="Georgia,serif" font-size="20" fill="#0F2818" text-anchor="middle" font-weight="700">5.8%</text>
<text x="520" y="225" font-family="monospace" font-size="9" fill="rgba(166,232,154,0.7)" text-anchor="middle">+81% краще</text>

<!-- ROI badge -->
<rect x="50" y="320" width="180" height="80" rx="14" fill="rgba(91,201,126,0.10)" stroke="rgba(91,201,126,0.4)" stroke-width="1"/>
<text x="68" y="346" font-family="monospace" font-size="10" fill="rgba(91,201,126,0.85)" letter-spacing="1.5">СЕРЕДНІЙ ROI</text>
<text x="68" y="380" font-family="Georgia,serif" font-size="32" fill="#A6E89A" font-weight="300">×4.2</text>
</svg>
