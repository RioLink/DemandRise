<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420">
<defs>
  <linearGradient id="bgMed" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0F2027"/>
    <stop offset="55%" stop-color="#16323B"/>
    <stop offset="100%" stop-color="#1A1714"/>
  </linearGradient>
  <linearGradient id="medAccent" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4FD8C4"/>
    <stop offset="100%" stop-color="#2FA89B"/>
  </linearGradient>
</defs>
<rect width="640" height="420" fill="url(#bgMed)"/>
<ellipse cx="460" cy="120" rx="220" ry="160" fill="rgba(79,216,196,0.10)"/>

<!-- Phone chat mockup -->
<rect x="380" y="40" width="200" height="300" rx="26" fill="rgba(255,255,255,0.05)" stroke="rgba(79,216,196,0.3)" stroke-width="1.5"/>
<rect x="392" y="56" width="176" height="270" rx="14" fill="rgba(15,32,39,0.85)"/>
<rect x="430" y="46" width="60" height="10" rx="5" fill="rgba(0,0,0,0.5)"/>
<!-- chat bubbles -->
<rect x="404" y="76" width="120" height="34" rx="14" fill="rgba(79,216,196,0.16)" stroke="rgba(79,216,196,0.35)" stroke-width="1"/>
<text x="414" y="97" font-family="DM Sans, sans-serif" font-size="9" fill="rgba(247,244,239,0.7)">Запис на прийом 🩺</text>
<rect x="424" y="120" width="132" height="34" rx="14" fill="url(#medAccent)" opacity="0.9"/>
<text x="434" y="141" font-family="DM Sans, sans-serif" font-size="9" fill="#0F2027" font-weight="600">Вівторок, 14:30 ✓</text>
<rect x="404" y="164" width="100" height="34" rx="14" fill="rgba(79,216,196,0.16)" stroke="rgba(79,216,196,0.35)" stroke-width="1"/>
<text x="414" y="185" font-family="DM Sans, sans-serif" font-size="9" fill="rgba(247,244,239,0.7)">Дякую!</text>
<!-- bot avatar -->
<circle cx="568" cy="93" r="14" fill="rgba(79,216,196,0.25)" stroke="rgba(79,216,196,0.5)" stroke-width="1.2"/>
<text x="568" y="98" font-size="13" text-anchor="middle">🤖</text>

<!-- Calendar grid -->
<rect x="404" y="210" width="152" height="100" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="414" y="228" font-family="monospace" font-size="8" fill="rgba(79,216,196,0.7)" letter-spacing="1">ЛИПЕНЬ 2026</text>
<g fill="rgba(79,216,196,0.18)">
<rect x="414" y="238" width="16" height="16" rx="3"/><rect x="436" y="238" width="16" height="16" rx="3"/><rect x="458" y="238" width="16" height="16" rx="3"/><rect x="480" y="238" width="16" height="16" rx="3"/><rect x="502" y="238" width="16" height="16" rx="3"/><rect x="524" y="238" width="16" height="16" rx="3"/>
<rect x="414" y="260" width="16" height="16" rx="3"/><rect x="436" y="260" width="16" height="16" rx="3"/>
</g>
<rect x="458" y="260" width="16" height="16" rx="3" fill="#4FD8C4"/>
<g fill="rgba(79,216,196,0.18)"><rect x="480" y="260" width="16" height="16" rx="3"/><rect x="502" y="260" width="16" height="16" rx="3"/><rect x="524" y="260" width="16" height="16" rx="3"/></g>

<!-- Stat badge -->
<rect x="40" y="50" width="180" height="86" rx="14" fill="rgba(79,216,196,0.10)" stroke="rgba(79,216,196,0.4)" stroke-width="1"/>
<text x="58" y="78" font-family="monospace" font-size="10" fill="rgba(79,216,196,0.8)" letter-spacing="1.5">ДЗВІНКИ РЕЦЕПЦІЇ</text>
<text x="58" y="112" font-family="Georgia,serif" font-size="34" fill="#4FD8C4" font-weight="300">-80%</text>

<!-- Pulse / heartbeat line -->
<polyline points="40,180 90,180 105,150 120,210 135,170 150,180 320,180" fill="none" stroke="rgba(79,216,196,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="320" cy="180" r="5" fill="#4FD8C4"/>

<!-- Cross icon -->
<rect x="40" y="220" width="56" height="56" rx="14" fill="rgba(79,216,196,0.12)" stroke="rgba(79,216,196,0.35)" stroke-width="1.2"/>
<rect x="62" y="234" width="12" height="28" rx="3" fill="#4FD8C4"/>
<rect x="54" y="242" width="28" height="12" rx="3" fill="#4FD8C4"/>

<!-- Labels -->
<text x="40" y="368" font-family="Georgia,serif" font-size="24" fill="rgba(247,244,239,0.92)">Клініка «MedLine»</text>
<text x="40" y="393" font-family="monospace" font-size="11" fill="rgba(79,216,196,0.85)" letter-spacing="1.5">TELEGRAM-БОТ ЗАПИСУ · -80% ДЗВІНКІВ</text>
</svg>
